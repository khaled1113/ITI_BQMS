<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharaonic QR Code Generator</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Pharaonic QR Code Generator</h1>
        </header>
        <main>
            <div class="qr-code-section">
                <label for="input-url">Enter URL:</label>
                <input type="text" id="input-url" placeholder="https://example.com">
                <button id="generate-btn">Generate QR Code</button>
                <div id="qr-code"></div>
            </div>
        </main>
        <footer>
            <p>&copy; 2023 Pharaonic QR Code Generator</p>
        </footer>
    </div>
    <script src="scripts/app.js"></script>
</body>
</html>
